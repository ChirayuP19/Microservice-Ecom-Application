        dialect: org.hibernate.dialect.PostgreSQLDialect # Add this here
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
    resilience4j:
      enabled: true

  tracing:
    sampling:
      probability: 1.0


