server:
  port: 8888

spring:
  application:
    name: ConfigServers
  profiles:
    active: native
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:guest}
    connection-timeout: 30000
  cloud:
    config:
      server:
        native:
          search-locations: file:///C:\Users\chira\Desktop\JAVA\Microservices Projects\user-workspace\ConfigServers\ConfigServers\src\main\resources\config

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging: # this is for save loges into file.
  file:
    name: logs/${spring.application.name}.log
  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 7